<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delta Test Virtual Tour</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <strong>Delta Test</strong>
      <span>Interactive Design Tour</span>
    </div>
    <button id="menuButton" type="button">Scenes</button>
  </header>

  <aside id="sceneMenu" class="scene-menu">
    <button type="button" data-scene="scene1">Scene 1</button>
    <button type="button" data-scene="scene2">Scene 2</button>
  </aside>

  <main id="panorama" aria-label="Interactive panorama viewer"></main>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
